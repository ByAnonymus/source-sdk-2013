bind space +duckjump

alias +duckjump "+duck; +jump"
alias -duckjump "-duck; -jump"
bind "k" kill
bind "'" explode
bind "0" "slot10"
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "6" "slot6"
bind 7 "say /taunt high five"
bind 8 "say /taunt shred"
bind 9 "say /taunt schadenfreude"
bind "o" "disguise 8 -2"
bind "kp_end" "load_itempreset 0"
bind "kp_downarrow" "load_itempreset 1"
bind "kp_pgdn" "load_itempreset 2"
bind "kp_leftarrow" "load_itempreset 3"

bind "kp_home" "say /taunt scar"
net_graph 1
	alias "+duckJumpAttack" "+duck; +jump; +attack"
	alias "-duckJumpAttack" "-duck; -jump; -attack"
bind "mouse2" "+attack2"
bind "mouse3" "+duckJumpAttack"
crosshair 0
bind mouse4 "Voicemenu 1 4"
//Shift-VoiceCommand
alias +voice "bind "MOUSE1" "m1voice"; bind "MOUSE2" "m2voice""
alias -voice "bind "MOUSE1" "+attack"; bind "MOUSE2" "+attack2"
alias m1voice "Voicemenu 0 6;"
alias m2voice "voicemenu 0 7;"
bind shift "+voice"